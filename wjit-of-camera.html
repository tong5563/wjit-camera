<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WJIT OF Camera</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #101820;
      color: #f7fbff;
    }

    main {
      width: min(820px, 100%);
      margin: 0 auto;
      padding: 10px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: 21px;
    }

    #target {
      color: #d6e1eb;
      font-size: 14px;
      text-align: right;
    }

    #cameraBox {
      position: relative;
      width: 100%;
      background: #000;
      border: 1px solid #344454;
      border-radius: 8px;
      overflow: hidden;
    }

    video {
      display: block;
      width: 100%;
      min-height: 360px;
      background: #000;
    }

    #overlay {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: #ffeb3b;
      font-size: clamp(52px, 16vw, 108px);
      font-weight: 900;
      text-shadow: 5px 5px 12px #000;
      pointer-events: none;
      white-space: nowrap;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    button {
      min-height: 54px;
      border: 0;
      border-radius: 7px;
      padding: 12px;
      font-size: 18px;
      font-weight: 900;
      color: #101820;
      background: #ffeb3b;
      cursor: pointer;
    }

    button.secondary { background: #dbe6ef; }
    button.danger { background: #ff8a80; }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    #status {
      margin-top: 10px;
      min-height: 34px;
      color: #d6e1eb;
      white-space: pre-line;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>OF Camera</h1>
      <div id="target"></div>
    </header>

    <div id="cameraBox">
      <video id="video" autoplay playsinline muted></video>
      <div id="overlay">H0</div>
    </div>

    <div class="controls">
      <button id="captureBtn" type="button" disabled>Capture</button>
      <button id="skipBtn" class="secondary" type="button">Skip</button>
      <button id="closeBtn" class="danger" type="button">Close</button>
      <button id="switchBtn" class="secondary" type="button" disabled>Switch Camera</button>
    </div>

    <div id="status"></div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const sessionToken = params.get('session') || '';
    const uploadUrl = params.get('uploadUrl') || '';

    let code = params.get('code') || '';
    let label = params.get('label') || 'H0';
    let mode = params.get('mode') || 'multi';
    let boardTotal = parseInt(params.get('boardTotal') || '3', 10);
    let stream = null;
    let preferredFacingMode = 'environment';
    let cameraReady = false;
    let finalMode = false;

    const MAX_CAPTURE_WIDTH = 2560;
    const JPEG_QUALITY = 0.9;

    const uploadState = {
      started: 0,
      done: 0,
      failed: 0,
      tasks: []
    };

    const els = {
      video: document.getElementById('video'),
      overlay: document.getElementById('overlay'),
      target: document.getElementById('target'),
      captureBtn: document.getElementById('captureBtn'),
      skipBtn: document.getElementById('skipBtn'),
      closeBtn: document.getElementById('closeBtn'),
      switchBtn: document.getElementById('switchBtn'),
      status: document.getElementById('status')
    };

    function render() {
      els.overlay.textContent = label;
      els.target.textContent = [code, label].filter(Boolean).join(' / ');
      els.skipBtn.hidden = mode !== 'multi';
    }

    function updateButtons() {
      const canUseCamera = !!stream && cameraReady && !finalMode;
      els.captureBtn.disabled = !canUseCamera;
      els.switchBtn.disabled = !canUseCamera;
      els.skipBtn.disabled = finalMode;
    }

    function uploadText() {
      if (uploadState.started === 0) return '';
      return 'Uploads: ' + uploadState.done + '/' + uploadState.started +
        (uploadState.failed ? ' failed: ' + uploadState.failed : '');
    }

    function setStatus(text) {
      const extra = uploadText();
      els.status.textContent = extra ? text + '\n' + extra : text;
    }

    function postToApp(type, extra) {
      try {
        if (!window.opener) return;
        window.opener.postMessage(Object.assign({
          source: 'wjit-of-camera',
          type,
          sessionToken,
          code,
          label
        }, extra || {}), '*');
      } catch (err) {}
    }

    function normalizeCode(raw) {
      const digits = String(raw || '')
        .toUpperCase()
        .replace(/^OF\.?/, '')
        .replace(/\D/g, '');

      if (!digits) return '';
      if (digits.length <= 4) return 'OF.' + digits;
      return 'OF.' + digits.slice(0, 4) + '.' + digits.slice(4, 6);
    }

    function playShutterSound() {
      try {
        const AudioContextImpl = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextImpl) return;
        const audioCtx = new AudioContextImpl();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.value = 1000;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        gain.gain.setValueAtTime(0.25, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
        osc.start(now);
        osc.stop(now + 0.08);
      } catch (err) {}
    }

    function vibrate() {
      if (navigator.vibrate) navigator.vibrate(80);
    }

    function stopCamera() {
      cameraReady = false;

      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }

      updateButtons();
    }

    function waitForVideoReady() {
      return new Promise(resolve => {
        if (els.video.readyState >= 2 && els.video.videoWidth > 0) {
          resolve();
          return;
        }

        const done = () => {
          els.video.removeEventListener('loadedmetadata', done);
          els.video.removeEventListener('canplay', done);
          resolve();
        };

        els.video.addEventListener('loadedmetadata', done);
        els.video.addEventListener('canplay', done);
      });
    }

    async function startCamera() {
      stopCamera();
      setStatus('Starting camera...');

      try {
        const constraints = {
          audio: false,
          video: {
            facingMode: { ideal: preferredFacingMode },
            width: { ideal: 2560 },
            height: { ideal: 1440 }
          }
        };

        stream = await navigator.mediaDevices.getUserMedia(constraints);

        els.video.srcObject = stream;
        updateButtons();
        setStatus('Waiting for camera preview...');

        try {
          await els.video.play();
        } catch (err) {}

        await waitForVideoReady();

        cameraReady = true;
        updateButtons();
        setStatus('Camera ready. Press Capture.');
      } catch (err) {
        setStatus('Camera error: ' + err.message);
      }
    }

    function captureFrame() {
      if (finalMode) return;

      if (!stream || !cameraReady || els.video.readyState < 2 || !els.video.videoWidth) {
        setStatus('Camera is still starting. Please wait until Camera ready.');
        return;
      }

      if (!uploadUrl) {
        setStatus('Upload URL missing. Open camera from the main app page.');
        return;
      }

      if (!code) {
        setStatus('OF missing. Open camera from the main app page.');
        return;
      }

      playShutterSound();
      vibrate();

      const capturedLabel = label;
      const dataUrl = makePhotoDataUrl(capturedLabel);

      queueUpload(capturedLabel, dataUrl);
      advanceAfterCapture(capturedLabel);
    }

    function makePhotoDataUrl(capturedLabel) {
      const sourceWidth = els.video.videoWidth || 1280;
      const sourceHeight = els.video.videoHeight || 720;
      const scale = Math.min(1, MAX_CAPTURE_WIDTH / sourceWidth);
      const outputWidth = Math.round(sourceWidth * scale);
      const outputHeight = Math.round(sourceHeight * scale);

      const canvas = document.createElement('canvas');
      canvas.width = outputWidth;
      canvas.height = outputHeight;

      const ctx = canvas.getContext('2d');
      ctx.drawImage(els.video, 0, 0, outputWidth, outputHeight);

      const padding = 30;
      const fontSize = Math.max(32, Math.floor(canvas.height / 25));
      ctx.font = 'bold ' + fontSize + 'px Arial';
      ctx.fillStyle = 'rgba(255, 235, 59, 0.92)';
      ctx.shadowColor = '#000';
      ctx.shadowBlur = 8;
      ctx.textAlign = 'right';
      ctx.fillText(code + ' / ' + capturedLabel, canvas.width - padding, canvas.height - padding);

      return canvas.toDataURL('image/jpeg', JPEG_QUALITY);
    }

    function queueUpload(position, dataUrl) {
      uploadState.started++;

      const task = fetch(uploadUrl, {
        method: 'POST',
        mode: 'no-cors',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8'
        },
        body: JSON.stringify({
          source: 'wjit-of-camera',
          sessionToken,
          code: normalizeCode(code),
          position,
          imageData: dataUrl
        })
      })
        .then(() => {
          uploadState.done++;
          postToApp('direct-uploaded', { position });
        })
        .catch(() => {
          uploadState.failed++;
        })
        .finally(() => {
          if (finalMode) {
            setStatus('Finishing uploads...');
          } else {
            setStatus('Ready for ' + label + '.');
          }
        });

      uploadState.tasks.push(task);
      setStatus('Captured ' + position + '. Ready for next.');
    }

    function advanceAfterCapture(capturedLabel) {
      if (mode !== 'multi') {
        finishAfterAllUploads();
        return;
      }

      const currentNumber = parseInt(String(capturedLabel).replace('H', ''), 10);

      if (!Number.isNaN(currentNumber) && currentNumber + 1 < boardTotal) {
        label = 'H' + (currentNumber + 1);
        render();
        setStatus('Ready for ' + label + '.');
      } else {
        finishAfterAllUploads();
      }
    }

    function skipFrame() {
      if (mode !== 'multi' || finalMode) return;

      const currentNumber = parseInt(String(label).replace('H', ''), 10);

      if (!Number.isNaN(currentNumber) && currentNumber + 1 < boardTotal) {
        label = 'H' + (currentNumber + 1);
        render();
        setStatus('Skipped. Ready for ' + label + '.');
      } else {
        finishAfterAllUploads();
      }

      postToApp('skip');
    }

    async function finishAfterAllUploads() {
      finalMode = true;
      updateButtons();
      stopCamera();

      if (uploadState.tasks.length === 0) {
        setStatus('Finished. No photos to upload.');
        setTimeout(() => window.close(), 900);
        return;
      }

      setStatus('Finishing uploads...');
      await Promise.allSettled(uploadState.tasks);

      if (uploadState.failed > 0) {
        setStatus('Upload finished with ' + uploadState.failed + ' failed. Please check Drive.');
      } else {
        setStatus('Upload complete. Closing camera...');
        setTimeout(() => window.close(), 900);
      }
    }

    function switchCamera() {
      if (finalMode) return;
      preferredFacingMode = preferredFacingMode === 'environment' ? 'user' : 'environment';
      startCamera();
    }

    window.addEventListener('message', event => {
      const msg = event.data || {};
      if (msg.source !== 'wjit-of-app') return;
      if (msg.sessionToken !== sessionToken) return;

      if (msg.type === 'close') {
        finishAfterAllUploads();
      }
    });

    els.captureBtn.addEventListener('click', captureFrame);
    els.skipBtn.addEventListener('click', skipFrame);
    els.closeBtn.addEventListener('click', finishAfterAllUploads);
    els.switchBtn.addEventListener('click', switchCamera);

    window.addEventListener('beforeunload', () => {
      stopCamera();
      postToApp('closed');
    });

    code = normalizeCode(code);
    render();
    startCamera();
  </script>
</body>
</html>
